      summary: Batch add insurance options to a listing
      description: Add multiple insurance options to a listing in a single request
      operationId: batchAddListingInsuranceOptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
            example:
              items:
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  insurance_option_id: "223e4567-e89b-12d3-a456-426614174001"
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  insurance_option_id: "323e4567-e89b-12d3-a456-426614174002"
