              $ref: '#/components/schemas/BatchRequest'
            example:
              items:
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  equipment_id: "223e4567-e89b-12d3-a456-426614174001"
                  quantity: 5
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  equipment_id: "323e4567-e89b-12d3-a456-426614174002"
