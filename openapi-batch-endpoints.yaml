            example:
              items:
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  dining_option_id: "223e4567-e89b-12d3-a456-426614174001"
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  dining_option_id: "323e4567-e89b-12d3-a456-426614174002"
      responses:
