openapi: 3.0.3
info:
  title: Nook and Care - Batch Listing Features API
  description: Batch endpoints for managing listing features (amenities, activities, languages, etc.)
  version: 1.0.0
  contact:
    name: Nook and Care API Support

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
  - url: https://api.find-your-nook.base44.app/api/v1
    description: Production server

tags:
  - name: Listing Features
    description: Batch operations for listing features

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/v1/auth/login

  schemas:
    BatchRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - listing_id
            properties:
              listing_id:
                type: string
                format: uuid
                description: The listing ID
              amenity_id:
                type: string
                format: uuid
                description: The amenity ID (for amenities)
              activity_id:
                type: string
                format: uuid
                description: The activity ID (for activities)
              language_id:
                type: string
                format: uuid
                description: The language ID (for languages)
              certification_id:
                type: string
                format: uuid
                description: The certification ID (for certifications)
              license_number:
                type: string
                nullable: true
                description: License number (for certifications, optional)
              dining_option_id:
                type: string
                format: uuid
                description: The dining option ID (for dining options)
              safety_feature_id:
                type: string
                format: uuid
                description: The safety feature ID (for safety features)
              insurance_option_id:
                type: string
                format: uuid
                description: The insurance option ID (for insurance options)
              house_rule_id:
                type: string
                format: uuid
                description: The house rule ID (for house rules)
              display_order:
                type: integer
                minimum: 0
                description: Display order (for house rules, optional)
              equipment_id:
                type: string
                format: uuid
                description: The equipment ID (for equipment)
              quantity:
                type: integer
                minimum: 1
                default: 1
                description: Quantity (for equipment, optional, defaults to 1)
              treatment_service_id:
                type: string
                format: uuid
                description: The treatment service ID (for services)
              price:
                type: number
                format: float
                nullable: true
                description: Price for the service (for services, optional)
              is_included:
                type: boolean
                default: false
                description: Whether the service is included (for services, optional)

    ListingAmenityRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        amenity_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ListingActivityRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        activity_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ListingLanguageRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        language_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ListingCertificationRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        certification_id:
          type: string
          format: uuid
        license_number:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    ListingDiningOptionRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        dining_option_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ListingSafetyFeatureRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        safety_feature_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ListingInsuranceOptionRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        insurance_option_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ListingHouseRuleRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        house_rule_id:
          type: string
          format: uuid
        display_order:
          type: integer
        created_at:
          type: string
          format: date-time

    ListingEquipmentRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        equipment_id:
          type: string
          format: uuid
        quantity:
          type: integer
        created_at:
          type: string
          format: date-time

    ListingServiceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listing_id:
          type: string
          format: uuid
        treatment_service_id:
          type: string
          format: uuid
        price:
          type: number
          format: float
          nullable: true
        is_included:
          type: boolean
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              item_index:
                type: integer
              field:
                type: string
              message:
                type: string

paths:
  /listing-amenities/batch:
    post:
      tags:
        - Listing Features
      summary: Batch add amenities to a listing
      description: Add multiple amenities to a listing in a single request
      operationId: batchAddListingAmenities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
            example:
              items:
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  amenity_id: "223e4567-e89b-12d3-a456-426614174001"
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  amenity_id: "323e4567-e89b-12d3-a456-426614174002"
      responses:
        '201':
          description: Amenities added successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListingAmenityRecord'
        '400':
          description: Bad request - Invalid data or duplicates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - User doesn't own the listing
        '404':
          description: Listing or amenity not found

  /listing-activities/batch:
    post:
      tags:
        - Listing Features
      summary: Batch add activities to a listing
      description: Add multiple activities to a listing in a single request
      operationId: batchAddListingActivities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
            example:
              items:
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  activity_id: "223e4567-e89b-12d3-a456-426614174001"
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  activity_id: "323e4567-e89b-12d3-a456-426614174002"
      responses:
        '201':
          description: Activities added successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListingActivityRecord'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  /listing-languages/batch:
    post:
      tags:
