                  language_id: "223e4567-e89b-12d3-a456-426614174001"
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  language_id: "323e4567-e89b-12d3-a456-426614174002"
      responses:
        '201':
          description: Languages added successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListingLanguageRecord'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found

  /listing-certifications/batch:
    post:
      tags:
        - Listing Features
      summary: Batch add certifications to a listing
      description: Add multiple certifications to a listing in a single request
      operationId: batchAddListingCertifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
            example:
              items:
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  certification_id: "223e4567-e89b-12d3-a456-426614174001"
                  license_number: "LIC-12345"
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  certification_id: "323e4567-e89b-12d3-a456-426614174002"
                  license_number: null
      responses:
        '201':
          description: Certifications added successfully
          content:
