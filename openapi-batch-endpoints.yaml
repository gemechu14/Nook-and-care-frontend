          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
            example:
              items:
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  house_rule_id: "223e4567-e89b-12d3-a456-426614174001"
                  display_order: 1
                - listing_id: "123e4567-e89b-12d3-a456-426614174000"
                  house_rule_id: "323e4567-e89b-12d3-a456-426614174002"
